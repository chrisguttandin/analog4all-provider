<label for="source-id">audio input:</label>
<select id="source-id" [ngModel]="sourceId" (ngModelChange)="onChange($event)">
    @for (audioInput of audioInputs$ | async; track audioInput) {
        <option [ngValue]="audioInput.deviceId">{{ audioInput.label }}</option>
    }
</select>
<p>The selected audio input gets used to record the audio signal.</p>
